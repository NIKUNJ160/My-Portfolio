name = "my-portfolio"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Production Performance Defaults
minify = true

[placement]
mode = "smart"

[assets]
directory = "./public"

[[d1_databases]]
binding = "DB"
database_name = "portfolio-db"
database_id = "d9e46eaa-6f5f-428c-98e2-b67f4da500ba"

[vars]
ALLOW_REGISTRATION = "false"

# ─── Production Deployment Configuration ───
# Ensures absolute consistency when deploying with '--env production' (e.g. via CI/CD pipelines)
[env.production]
name = "my-portfolio"
compatibility_date = "2024-12-01"
minify = true

[env.production.placement]
mode = "smart"

[[env.production.d1_databases]]
binding = "DB"
database_name = "portfolio-db"
database_id = "d9e46eaa-6f5f-428c-98e2-b67f4da500ba"

[env.production.vars]
ALLOW_REGISTRATION = "false"

# ─── Staging Deployment Configuration ───
# For previewing changes safely prior to live production releases
[env.staging]
name = "my-portfolio-staging"
compatibility_date = "2024-12-01"
minify = true

[env.staging.placement]
mode = "smart"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "portfolio-db"
database_id = "d9e46eaa-6f5f-428c-98e2-b67f4da500ba"

[env.staging.vars]
ALLOW_REGISTRATION = "false"
